spring.jpa.hibernate.ddl-auto = none
spring.jpa.properties.hibernate.globally_quoted_identifiers = TRUE
spring.jpa.open-in-view = FALSE


# MySql settings
spring.datasource.driver-class-name = com.mysql.cj.jdbc.Driver
spring.datasource.username = root
spring.datasource.password = admin
spring.datasource.url = jdbc:mysql://localhost:3306/cartao?useTimezone=true&serverTimezone=UTC
#spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Propriedades Do JPA
spring.jpa.properties.hibernate.show_sql = TRUE
spring.jpa.properties.hibernate.format_sql = TRUE
spring.jpa.properties.hibernate.order_updates = TRUE
spring.jpa.properties.hibernate.generate_statistics=TRUE
spring.jpa.properties.hibernate.use_sql_comments = TRUE	
spring.jpa.properties.hibernate.jdbc.use_streams_for_binary = TRUE
spring.datasource.hikari.maximum-pool-size = 10


#Caminhos de acesso URL
logging.level.org.springframework.web: trace
#SituańŃoApache
#logging.level.org.apache: trace
spring.mvc.log-request-details = true
spring.webflux.log-request-details = true

spring.data.rest.basePath=/
